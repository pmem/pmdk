ignore:
  - src/windows/
  - src/test/
  - src/common/valgrind/
  - src/benchmarks/

comment:
  layout: "diff"
  behavior: default
  require_changes: yes

coverage:
  precision: 2
  round: up
  range: "65...100"

parsers:
  gcov:
    branch_detection:
      conditional: false
      loop: false
      method: false
      macro: false
